<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GOFAR</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <!-- Link ke CSS Eksternal --->
    <link rel="stylesheet" href="style.css" />
    <!-- Library PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  </head>
  <body>
    <!-- Desktop Icons -->
    <div class="desktop-icons">
      <a href="#beranda" class="desktop-icon"
        ><div class="d-icon-box">🏠</div>
        <span>Beranda</span></a
      >
      <a href="#about" class="desktop-icon"
        ><div
          class="d-icon-box"
          style="
            background: linear-gradient(135deg, #87ceeb, #4682b4);
            border-color: #4682b4;
          "
        >
          👤
        </div>
        <span>About</span></a
      >
      <a href="#education" class="desktop-icon"
        ><div
          class="d-icon-box"
          style="
            background: linear-gradient(135deg, #dda0dd, #8b008b);
            border-color: #8b008b;
          "
        >
          🎓
        </div>
        <span>Education</span></a
      >
      <a href="#workexperience" class="desktop-icon"
        ><div
          class="d-icon-box"
          style="
            background: linear-gradient(135deg, #90ee90, #228b22);
            border-color: #228b22;
          "
        >
          💼
        </div>
        <span>Work Experience</span></a
      >
      <a href="#skills" class="desktop-icon"
        ><div
          class="d-icon-box"
          style="
            background: linear-gradient(135deg, #ffb6c1, #dc143c);
            border-color: #dc143c;
          "
        >
          ⚡
        </div>
        <span>Skills / Experience</span></a
      >
      <a href="#project" class="desktop-icon"
        ><div
          class="d-icon-box"
          style="
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-color: #ff8c00;
          "
        >
          📁
        </div>
        <span>Project</span></a
      >
      <a href="#achievements" class="desktop-icon"
        ><div
          class="d-icon-box"
          style="
            background: linear-gradient(135deg, #98fb98, #006400);
            border-color: #006400;
          "
        >
          🏆
        </div>
        <span>Certificates / Achievements</span></a
      >
      <a href="#contact" class="desktop-icon"
        ><div
          class="d-icon-box"
          style="
            background: linear-gradient(135deg, #f0e68c, #b8860b);
            border-color: #b8860b;
          "
        >
          📧
        </div>
        <span>Contact</span></a
      >

      <a href="#message" class="desktop-icon"
        ><div
          class="d-icon-box"
          style="
            background: linear-gradient(135deg, #87ceeb, #4682b4);
            border-color: #4682b4;
          "
        >
          📝
        </div>
        <span>Message</span></a
      >
      <a href="#galeri" class="desktop-icon">
        <div
          class="d-icon-box"
          style="
            background: linear-gradient(135deg, #ff69b4, #c71585);
            border-color: #c71585;
          "
        >
          🖼️
        </div>
        <span>Galeri</span>
      </a>
    </div>

    <!-- Taskbar -->
    <div class="taskbar">
      <a class="start-btn">
        <img
          src="logo.png"
          alt="Logo"
          style="
            width: 30px;
            height: 30px;
            border-radius: 3px;
            object-fit: cover;
          "
        />
        <div style="border-radius: 3px"></div>
        <span class="text-start">Start</span>
      </a>
      <div class="taskbar-items">
        <a href="#beranda" class="task-item" onclick="setActive(this)">🏠</a>
        <a href="#about" class="task-item" onclick="setActive(this)">👤</a>
        <a href="#education" class="task-item" onclick="setActive(this)">🎓</a>
        <a href="#workexperience" class="task-item" onclick="setActive(this)"
          >💼</a
        >
        <a href="#skills" class="task-item" onclick="setActive(this)">⚡</a>
        <a href="#project" class="task-item" onclick="setActive(this)">📁</a>

        <a href="#achievements" class="task-item" onclick="setActive(this)"
          >🏆</a
        >

        <a href="#contact" class="task-item" onclick="setActive(this)">📧</a>

        <a href="#message" class="task-item" onclick="setActive(this)">📝</a>

        <a href="#galeri" class="task-item" onclick="setActive(this)">🖼️</a>
      </div>
      <div class="taskbar-clock" id="clock">--:--</div>
    </div>

    <!-- Main Content Area -->
    <div class="desktop-area" id="mainContainer">
      <div class="loading" id="loading">⏳ Memuat data portfolio...</div>
    </div>

    <!-- PDF Modal -->
    <div class="modal-overlay" id="pdfModal">
      <div class="modal-window">
        <div class="win-titlebar">
          <div class="win-title">
            <div class="win-title-icon"></div>
            <span id="modalTitle">PDF Viewer</span>
          </div>
          <div class="win-buttons">
            <div class="win-btn" onclick="closeModal()">_</div>
            <div class="win-btn close" onclick="closeModal()">×</div>
          </div>
        </div>
        <div class="modal-body">
          <div class="pdf-viewer" id="pdfViewer"></div>
        </div>
      </div>
    </div>
    <!-- Lightbox Modal -->

    <!-- LIGHTBOX -->
    <div class="lightbox-overlay" id="lightbox">
      <div class="lightbox-window">
        <div class="win-titlebar">
          <div class="win-title">
            <div
              class="win-title-icon"
              style="
                background: linear-gradient(135deg, #ff69b4, #c71585);
                border-color: #c71585;
              "
            ></div>
            <span id="lightboxTitle">Foto</span>
          </div>
          <div class="win-buttons">
            <div class="win-btn" onclick="closeLightbox()">_</div>
            <div class="win-btn close" onclick="closeLightbox()">×</div>
          </div>
        </div>
        <div class="lightbox-img-container">
          <img src="" alt="" id="lightboxImg" />
        </div>
        <div class="lightbox-info">
          <span id="lightboxCounter">1 / 1</span>
          <div class="lightbox-nav">
            <div class="win-btn" onclick="prevImage()">◀</div>
            <div class="win-btn" onclick="nextImage()">▶</div>
          </div>
          <span id="lightboxFilename">photo.jpg</span>
        </div>
      </div>
    </div>

    <!-- Link ke JS Eksternal -->
    <script src="script.js"></script>
  </body>
</html>
